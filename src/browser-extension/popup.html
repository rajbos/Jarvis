<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis Browser Companion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #ddd;
      padding: 12px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #eee;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      width: 100%;
    }
    .status-badge.connected {
      background: #0d2a0d;
      border: 1px solid #2e7d32;
      color: #81c784;
    }
    .status-badge.disconnected {
      background: #2a1a0a;
      border: 1px solid #795548;
      color: #ffb74d;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .connected .dot { background: #4caf50; }
    .disconnected .dot { background: #ff9800; }
    .help {
      margin-top: 10px;
      font-size: 11px;
      color: #888;
      line-height: 1.5;
    }
    .help a {
      color: #6a8caf;
      text-decoration: none;
    }
    .help a:hover { text-decoration: underline; }
    .version {
      margin-top: 10px;
      font-size: 10px;
      color: #555;
      text-align: right;
    }
  </style>
</head>
<body>
  <header>
    <span style="font-size:20px">🌐</span>
    <h1>Jarvis Companion</h1>
  </header>

  <div id="status" class="status-badge disconnected">
    <div class="dot"></div>
    <span id="status-text">Connecting…</span>
  </div>

  <div class="help" id="help-text" style="display:none">
    Make sure the Jarvis desktop app is running. The bridge listens on
    <code>ws://127.0.0.1:35789</code>.
  </div>

  <div class="version">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
