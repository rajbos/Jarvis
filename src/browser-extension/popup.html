<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis Browser Companion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #ddd;
      padding: 12px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #eee;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      width: 100%;
    }
    .status-badge.connected {
      background: #0d2a0d;
      border: 1px solid #2e7d32;
      color: #81c784;
    }
    .status-badge.disconnected {
      background: #2a1a0a;
      border: 1px solid #795548;
      color: #ffb74d;
    }
    .status-badge.invalid-token {
      background: #2a0a0a;
      border: 1px solid #c62828;
      color: #ef9a9a;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .connected .dot { background: #4caf50; }
    .disconnected .dot { background: #ff9800; }
    .invalid-token .dot { background: #f44336; }
    .token-section {
      margin-top: 10px;
      background: #222;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px;
    }
    .token-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 5px;
    }
    .token-row {
      display: flex;
      gap: 6px;
    }
    .token-row input {
      flex: 1;
      background: #111;
      border: 1px solid #555;
      border-radius: 4px;
      color: #ccc;
      font-size: 12px;
      font-family: monospace;
      padding: 4px 6px;
      min-width: 0;
    }
    .token-row input:focus { outline: none; border-color: #6a8caf; }
    .btn-save {
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-save:hover { background: #1976d2; }
    .token-hint {
      font-size: 10px;
      color: #666;
      margin-top: 5px;
    }
    .saved-msg {
      font-size: 11px;
      color: #81c784;
      margin-top: 4px;
      display: none;
    }
    .version {
      margin-top: 10px;
      font-size: 10px;
      color: #555;
      text-align: right;
    }
  </style>
</head>
<body>
  <header>
    <span style="font-size:20px">🌐</span>
    <h1>Jarvis Companion</h1>
  </header>

  <div id="status" class="status-badge disconnected">
    <div class="dot"></div>
    <span id="status-text">Connecting…</span>
  </div>

  <div class="token-section">
    <label for="token-input">🔑 Pairing Token</label>
    <div class="token-row">
      <input id="token-input" type="text" placeholder="Paste token from Jarvis app" autocomplete="off" spellcheck="false" />
      <button id="btn-save" class="btn-save">Save</button>
    </div>
    <div class="token-hint">Copy the token from the Browser Companion panel in the Jarvis app.</div>
    <div class="saved-msg" id="saved-msg">✓ Token saved — reconnecting…</div>
  </div>

  <div class="version">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
