<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Jarvis — Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 2rem;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 1.5rem;
      color: #e94560;
    }

    .section {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #c0c0c0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.8rem;
    }

    label {
      display: block;
      font-size: 0.88rem;
      color: #b0b0b0;
      margin-bottom: 0.5rem;
    }

    input[type="password"] {
      width: 300px;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      border: 1px solid #444;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 0.85rem;
    }

    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #c23152;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #666;
      color: #ccc;
    }

    .btn-secondary:hover {
      background: #333;
    }

    .btn-save {
      background: #2d6a4f;
      margin-left: 0.5rem;
    }

    .btn-save:hover {
      background: #1e4d38;
    }

    .pat-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    #pat-saved {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    #pat-saved span {
      color: #6fbf73;
      font-size: 0.88rem;
    }

    #pat-error {
      color: #e94560;
      font-size: 0.82rem;
      margin-top: 0.4rem;
      min-height: 1.2em;
    }

    .hint {
      color: #778;
      font-size: 0.78rem;
      margin-top: 0.5rem;
    }

    code {
      background: #0f3460;
      padding: 0 3px;
      border-radius: 3px;
      font-size: 0.85em;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <h1>Settings</h1>

  <div class="section">
    <h2>GitHub Access</h2>

    <label for="pat-input">Personal Access Token (PAT)</label>

    <div id="pat-input-wrap" class="pat-row">
      <input type="password" id="pat-input" placeholder="ghp_... or github_pat_...">
      <button id="pat-save-btn" class="btn-save">Save</button>
    </div>

    <div id="pat-saved" class="hidden">
      <span>&#10003; PAT configured</span>
      <button id="pat-remove-btn" class="btn-secondary">Remove</button>
    </div>

    <div id="pat-error"></div>

    <p class="hint">
      A PAT with <code>repo</code> + <code>read:org</code> scopes discovers repos in orgs that block OAuth apps.
    </p>
  </div>

  <script src="settings.js"></script>
</body>
</html>
