<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
  <title>Jarvis — Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 1.25rem 1.5rem;
    }

    h1 {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: #e94560;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .section {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.75rem;
    }

    .section h2 {
      font-weight: 600;
      margin-bottom: 0.6rem;
      color: #b0b8c8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.72rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #c8c8c8;
      margin-bottom: 0.4rem;
    }

    input[type="password"] {
      width: 100%;
      max-width: 280px;
      padding: 0.35rem 0.55rem;
      border-radius: 4px;
      border: 1px solid #444;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 0.83rem;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 0.5rem;
    }

    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 0.35rem 0.8rem;
      border-radius: 6px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover {
      background: #c23152;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid #555;
      color: #ccc;
    }

    .btn-secondary:hover {
      background: #0f3460;
      border-color: #888;
    }

    .btn-danger {
      background: transparent;
      border: 1px solid #e94560;
      color: #e94560;
    }

    .btn-danger:hover {
      background: rgba(233,69,96,0.15);
    }

    .btn-save {
      background: #2d6a4f;
    }

    .btn-save:hover {
      background: #1e4d38;
    }

    .pat-status {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: #6fbf73;
      margin-bottom: 0.5rem;
    }

    #pat-error {
      color: #e94560;
      font-size: 0.8rem;
      margin-top: 0.35rem;
      min-height: 1.1em;
    }

    .hint {
      color: #8899aa;
      font-size: 0.76rem;
      margin-top: 0.5rem;
      line-height: 1.4;
    }

    code {
      background: #0f3460;
      padding: 0 3px;
      border-radius: 3px;
      font-size: 0.85em;
    }

    .user-line {
      font-size: 0.85rem;
      color: #c8c8c8;
      margin-bottom: 0.6rem;
    }

    .user-line strong {
      color: #e0e0e0;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 0.7rem;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #0f3460;
      flex-shrink: 0;
      background: #0f3460;
    }

    .user-card-info {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .user-card-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: #e0e0e0;
    }

    .user-card-login {
      font-size: 0.78rem;
      color: #b0b8c8;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <h1>Settings</h1>

  <div class="section">
    <h2>GitHub Account</h2>

    <div id="oauth-signed-in" class="hidden">
      <div class="user-card">
        <img id="oauth-avatar" class="user-avatar" src="" alt="">
        <div class="user-card-info">
          <div class="user-card-name" id="oauth-name-label"></div>
          <div class="user-card-login" id="oauth-login-label"></div>
        </div>
      </div>
      <div class="btn-row">
        <button id="btn-run-oauth-discovery" class="btn-secondary">Run OAuth Discovery</button>
        <div style="flex: 1;"></div>
        <button id="btn-logout" class="btn-danger">Sign out</button>
      </div>
    </div>

    <div id="oauth-signed-out">
      <p style="font-size: 0.85rem; color: #778;">Not signed in.</p>
    </div>
  </div>

  <div class="section">
    <h2>GitHub Access — Personal Access Token</h2>

    <div id="pat-input-wrap">
      <label for="pat-input">Enter token to add or replace PAT</label>
      <div class="btn-row" style="margin-top: 0;">
        <input type="password" id="pat-input" placeholder="ghp_... or github_pat_...">
        <button id="pat-save-btn" class="btn-save">Save</button>
      </div>
    </div>

    <div id="pat-saved" class="hidden">
      <div class="user-card">
        <img id="pat-avatar" class="user-avatar" src="" alt="">
        <div class="user-card-info">
          <div class="user-card-name" id="pat-name-label"></div>
          <div class="user-card-login" id="pat-login-label"></div>
        </div>
      </div>
      <div class="btn-row">
        <button id="btn-run-pat-discovery" class="btn-secondary">Run PAT Discovery</button>
        <div style="flex: 1;"></div>
        <button id="pat-remove-btn" class="btn-danger">Remove</button>
      </div>
    </div>

    <div id="pat-error"></div>

    <p class="hint">
      A PAT with <code>repo</code> + <code>read:org</code> scopes discovers repos in orgs that block OAuth apps.
    </p>
  </div>

  <script src="settings.js"></script>
</body>
</html>
